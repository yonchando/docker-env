services:
    mysql:
        image: mysql:latest
        restart: unless-stopped
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: secret#pass
        volumes:
            - mysql:/var/lib/mysql

    pgsql:
        image: postgres:latest
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_PASSWORD: secret#pass
        volumes:
            - pgsql:/var/lib/postgresql/data

    adminer:
        image: adminer:latest
        ports:
            - "8080:8080"

    phpmyadmin:
        image: phpmyadmin:latest
        ports:
            - "2083:80"
        environment:
            PMA_ARBITRARY: 1

    mailpit:
        image: axllent/mailpit
        restart: unless-stopped
        volumes:
            - mailpit:/data
        ports:
            - "8025:8025"
            - "1025:1025"
        environment:
            MP_MAX_MESSAGES: 5000
            MP_DATABASE: /data/mailpit.db
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

    jaeger:
        image: jaegertracing/jaeger:2.9.0
#        restart: unless-stopped
        ports:
            - "16686:16686"
            - "5778:5778"
            - "9411:9411"
        volumes:
            - "./jaeger/config.yaml:/jaeger/config.yaml"
        command: [ "--config", "/jaeger/config.yaml" ]
        depends_on:
            - elastic-search

    prometheus:
        image: prom/prometheus
        restart: unless-stopped
        ports:
            - "9090:9090"
        volumes:
            - prometheus:/prometheus
            - ./prometheus.yml:/etc/prometheus/prometheus.yml

    grafana:
        image: grafana/grafana-enterprise
        restart: unless-stopped
        ports:
            - "3000:3000"
        volumes:
            - grafana-storage:/var/lib/grafana

    otel-collector:
        image: otel/opentelemetry-collector-contrib
        restart: unless-stopped
        volumes:
            - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
        ports:
            - "1888:1888" # pprof extension
            - "8888:8888" # Prometheus metrics exposed by the Collector
            - "8889:8889" # Prometheus exporter metrics
            - "13133:13133" # health_check extension
            - "4317:4317" # OTLP gRPC receiver
            - "4318:4318" # OTLP http receiver
            - "55679:55679" # zpages extension

    elastic-search:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.1.3
        restart: unless-stopped
        container_name: elastic-search
        ports:
            - "9200:9200"
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - ES_JAVA_OPTS=-Xms512m -Xmx512m
            - elastic_password=elastic#pass
        mem_limit: "1g"
        volumes:
            - elastic:/usr/share/elasticsearch/data
        networks:
            - default

    kibana:
        image: docker.elastic.co/kibana/kibana:9.1.3
        restart: unless-stopped
        container_name: kibana
        environment:
            ELASTICSEARCH_HOSTS: '["http://elastic-search:9200"]'
        ports:
            - "5601:5601"
        networks:
            - default
        depends_on:
            - elastic-search

    mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: mssql
        hostname: "mssql1"
        environment:
            ACCEPT_EULA: Y
            MSSQL_SA_PASSWORD: secret#pass123
        ports:
            - "1433:1433"
        volumes:
            - mssql:/var/opt/mssql

    mongo-db:
        image: mongo
        ports:
            - "27017:27017"
        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: 'secret'
        volumes:
            - mongoDB:/data/db
            - ./mongo:/etc/mongo
    
    mongo-express:
        image: mongo-express
        ports:
            - "8081:8081"
        environment:
            ME_CONFIG_MONGODB_URL: mongodb://root:secret@mongo-db:27017/
            ME_CONFIG_BASICAUTH_ENABLED: true
            ME_CONFIG_BASICAUTH_USERNAME: express
            ME_CONFIG_BASICAUTH_PASSWORD: 'secret#pass'
        depends_on:
            - mongo-db

volumes:
    mysql:
        driver: local
    pgsql:
        driver: local
    mailpit:
        driver: local
    minio:
        driver: local
    grafana-storage:
        driver: local
    prometheus:
        driver: local
    mssql:
        driver: local
    mongoDB:
        driver: local
    elastic:
        driver: local
networks:
    default:
        driver: bridge
