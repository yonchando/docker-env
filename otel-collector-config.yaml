receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318
processors:
    batch:

exporters:
    otlphttp/jaeger:
        endpoint: "http://jaeger:4318"
    otlphttp/prometheus:
        endpoint: "http://prometheus:4318"
    otlphttp/log:
        endpoint: "http://loki:4318"

extensions:
    health_check:
    pprof:
    zpages:

service:
    extensions: [ health_check, pprof, zpages ]
    pipelines:
        traces:
            receivers: [ otlp ]
            processors: [ batch ]
            exporters: [ otlphttp/jaeger ]
        metrics:
            receivers: [ otlp ]
            processors: [ batch ]
            exporters: [ otlphttp/jaeger ]
        logs:
            receivers: [ otlp ]
            processors: [ batch ]
            exporters: [ otlphttp/log ]
