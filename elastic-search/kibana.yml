server.host: "0.0.0.0"
server.shutdownTimeout: "5s"
elasticsearch.hosts: ["https://es01:9200"]
elasticsearch.ssl.certificateAuthorities: /usr/share/kibana/config/certs/http_ca.crt
elasticsearch.ssl.verificationMode: "certificate"
elasticsearch.requestHeadersWhitelist: ["es-client-authentication"]
elasticsearch.serviceAccountToken: "${ELASTIC_TOKEN}"
